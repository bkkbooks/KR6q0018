front:
  text: 五燈嚴統序治有治統雖典午奄有朔南僅足為漢唐之閏位道有道統雖河汾擬經贊述詎敢奸洙泗之見知禪有禪統即宗分五派無非紹震旦之初燈然不面證一堂未許稱傳衣之法嗣乃有承虗接響偶以私淑因而暗易呂嬴甚者竊玉操戈漫拾唾餘幾至叛同楊墨況定慧妙含萬變自非合下領略何異執火覓燈而機用指非一端若第滑突應承只是摶沙作飯在吾儒菽粟倫常為周行之路設有奇趨詭服不難竟斥為異端在佛門鉗錘密義稱法乳之恩必與別系正名才堪親驗其的血費隱老和尚受記天童承先啓後惄乎其有深思焉此五燈嚴統之所由訂刻也余於傳燈諸書愧未夙習近承麈拂微聆緒言益信西方東土諸大聖人了無二義因思宣聖之教極之至於無聲無臭可謂精微之至矣而究竟範圍之以中庸若不知此事之甚庸則索隱索微總之外道非中道也不中庸不可以為精微也佛祖之教極之至於無量無邊可謂廣大之至矣而究竟範圍之以精嚴若不知此事之甚嚴則誦佛謗佛總之亂統非正統也不精嚴不可以為廣大也自茲統出而刪僞訂訛析疑傳信皎如日星麗而江河行吾寧惟仰止其婆心尤服膺其定識十六字昌言共拜而亮工熙績不必盡列見知千百則公案同參而南嶽青原未可越參坐位噫嚴矣哉時順治壬辰長至前五日明賜進士出身正治卿中奉大夫禮部右侍郎兼侍讀學士掌翰林院事經筵日講制敕撰文纂修國史侍吳曹勳謹序五燈嚴統序聞宗法之傳旁門岐路在所必嚴旁岐一出不惟冒借遙嗣成竊玉假雞之謬漸至以誹謗為機鋒以紏劈為棒喝而正宗幾希絶矣不知宗法有源有委有支嫡從自六祖曹溪後分南嶽青原二派其源也南嶽下臨濟溈仰法眼雲門暨青原下曹洞為五宗其委也臨濟之有興化楊岐雲門之有智門雪竇曹洞之有投子芙蓉其支流也下此如圜悟虎丘天童長蘆雖嫡從有分其間塵鉢相承而子若孫而曾而玄下及數十代燈傳焰續如國之史族之譜帝王賢聖之統緒孰敢假一人一字以濫家乘名器乎從來住世善知識因緣大事或待參提然誰為開宗誰為建幢誰為傳衣繼拂未有不皎如星布指掌可辨者是宗法間有能不襲文字而三藏志名諸山勒石以得其派故耳否則枝葉紛流宮墻異立是必依聲附譽乃克希拈花置鉢之初惜哉申韓楊墨之為孔孟懼信然矣余嘗讀宗門正名録其論雪庭之望宗雲門一案如利刃截竹猝見鋒痕足為天下後世承虗接響之戒故書以考訂宗派為立說而三著師承篇申明大端其羽翼禪門功不在禹下若云無師自悟此更妄中之妄何必指狐林兔窟向盲啞置辨耶徑山費和尚具大手眼正五燈絶續之訛而集嚴統二十五卷如首序南嶽細析天皇凡一切拈香謬妄者俱屬彈斥不獨發學者之所未發而傳燈世譜咸得江流嶽峙于上下千古間矣是願後之學者讀此書顧名思議知身所自出與身所自承明示笑投針仍還鷲嶺龍樹之舊可耳夫復何贅時順治八年辛卯秋八月內翰林祕書院纂修實録編修加一級韋成賢薰沐頓首拜撰五燈嚴統序粵自三教行而禪道至今日甚盛矣然禪統至今日漸淆矣費隱大禪師有殷憂焉去秋未赴徑山時九月既望自福嚴抵禾招余同詣雲間館于小崑山房與士材李居士將舊本五燈推詳授受根究來繇抉從前之疑窟訂向後之信傳光明正大為開闢來佛教流通一大準則至洞宗如淨以後非無續刊然而影承響接較儒家之魯魚亥豕竟評唱訓詁之差訛殊增浩嘆余三人矢公矢慎遡源析流採集五卷皆百禪師苦心遍索手録成帙者比時深憂任事無人募資乏力余目擊時艱慨焉擔荷束卷南還輪金購梨鳩工寫劂旋到金粟與百師又加𨤲剔親為較讐朝催暮逼至春初竣業而後喜可知也共前翻刻計二十五卷總顏曰五燈嚴統茲秋孟徑山老人寄士材序文至閲之朗朗揭日足令售贋鼎者緘口余不諳且不文竊於命名至意不能默默而處於此何也西竺五印禪脉也東旦五葉禪宗也一分為五雖百千萬億會歸一元則正統當核五殽于一則建幢立法漸至不可思議則閏統當稽況別戶分門慮不無短長簧鼓則合而分分而合之統當辨夫核也稽也辨也皆嚴也嚴與刻相反而毋縱毋濫刻正所以成其嚴也余幼習儒曾選刻歷朝鑑燦明朝芳摹經書指略行世可不負儒長而從佛未登賢書之籍先廁密室之名亦為選刻破邪八集今費老人與百禪師前引後接左挈右提事事相扶心心相印箇中既通消息功名等若浮雲遂棄公車猛圖佛乘所以茲編合掌承當跂足立就執鞭從事以心之所欽樹天下萬世之防敢曰有功於禪庶幾不負禪云時順治辛卯孟秋朔旦武原徐昌治覲周父題於大業堂中五燈嚴統序昔我薄伽梵之道統相承也西天四七東土二三支為兩派分為五宗宗派彰明師承的據曉然起信于當時確然足徵於後世是以獅吼滿天下而假竊者無聞焉慨自大法垂秋人心不古如續略梓行未免有潦鶴之誤濫觴宗譜甚且機緣無據姓氏強托亂千秋之統開萬之訛若決江河安所底止嗟夫統系溷濫慧命等于懸絲凡有血氣者咸懷亂雅之傷矧百癡禪師以道統為己任能無蒿目深憂乎倘不力起而正之將胥後學于陰霾之域矣不獲已而有茲刻之舉徵考惟確筆削惟嚴親受記莂者方始登之楮墨承虗接響者靡不付之刪鋤譬諸九天之上而日星皎如萬鏡之中而燈珠燦爾奏績于祖庭者匪淺鮮也或者以多事相規則亦未知繼往開來乃慧脉是係間邪顯正實道統攸關自無容默默耳蓋軒轅之鏡懸而尤失其威白澤之圖者而妖狐滅其影行使掠虗者慚識法者懼而百禪師之初心不已慰耶計修討是編炎霜十更而定本始竣上自七佛下逮今茲凡二十有五卷庀材鳩工良非易事會覲周徐公香象神駒法林隆棟展閲一過擊節稱善遂蠲金前導而一時檀那莫不聞風興起且合簪連茹已俾多子塔前六十八傳之統奕葉昭明而假符竊命之侶浣滌淨盡嗣今而往在在染旃檀之香處處開塗毒之鼓誠別傳一宗希有盛事也嘗聞神呵康樂僧糾奉御咸人非人等加護之功固知是刻告成幽明並寶未幾將歸之娑竭龍藏不其與浩劫偕永久哉時順治庚寅仲冬朔旦雲間李中梓士材父識五燈嚴統序原夫拈華垂示微笑投機剎竿倒却乃受金襴教外別傳之道自此肇興以及西天四七東土二三莫不以芥輥針用機入彀道脈於是悠長且久者良繇承上啓下所從來之源允見師資道緣之契而綿遠世代多不乏人不唯聯芳濟美抑且隆盛繁昌不勝如日月燈之迭麗無復間隔其光明赫奕所以從上具眼尊宿猶千嶽萬峰摩肩輩出皆各有名言建立且一時彼此圓照而成宗旨遂致前後以有五家並峙於世然而若子若孫一皆覿面提持當陽契悟乃展轉派衍長流無或昧其法系所謂正宗正脈行於天下者名固正而言亦順縱萬億世皆足徵其源流可據也奈何世久天長數之盈虧道之隱顯其人稍昧便訛誤相承魚魯無辨致令龍潭信德山鑒之下若干人咸謂出自青原思石頭遷之派殊不知龍潭信德山鑒之兒孫多而尤繁實出馬祖一天王悟的派親傳如五燈會元第七卷所辨詳析最明即人天眼目及佛祖通載二書亦如是記近閲宗門正名録尤乃證如明鏡凡法門中明眼之人靡不共知其訛所差前輩都漠然不將較正以易其刻竟成千古一部疑書終無了日訛僞自此流下人法固當考正蓋此亦自古禪宗法系所攸關也然從此飛訛傳誤之後又復有薦福古因觸發紙上陳言遂遙繼昔之雲門偃不止百有餘認為法嗣之師所謂不肯別尋師印乃為己甚重而為法甚輕日居月諸弊積彌深遺至今日復突出非人不明當機契悟之脈只狥自己交結之私濫膺代付杳無識法之懼此固得罪法門難以枚舉不亦甚可嗟嘆乎猶有毫無干涉冒認向之何宗何人亦輒自遠紹乃稱王稱霸列皆久假不歸以墮前之薦福古之覆轍始則一二者為之猶有人頻生驚訛今也瀰漫遍地亂統莫稽如稻麻竹葦到處混擾致滿世間人皆不知覺恬不為怪不意禪宗一事重如單絲繫鼎延到於今如此濁惡莫可掬其淵源於戲借哉教外別傳直指之道將安寄焉容也自機契密雲先師以來主盟此事已二十餘春覽此歷來訛僞并見斯世混淆每捫臆痛心不能自安故始一知有宗門中事便發願欲一展筆經歷多載未酬夙志幸於辛卯秋承諸縉紳先生各具隻眼共相較正遂將天皇悟一枝並子若孫以屬青原思石頭遷之譜龍潭信德山鑒之下其子若孫仍歸馬祖一天王悟之派自此宗眼既明而派諜亦清又將薦福古之遙繼列出於未詳法嗣之埒以及今時墮車覆轍如續略之書著謬集訛肆出當世悉皆按栽唯取今昔正宗的派而當機契悟親承者彚輯成帙題曰五燈嚴統蓋亦不離一燈燃出五燈之意抑亦嚴加勘較從前相傳道統不涉紊亂而已聯舊續新共二十五卷然則禪門要典慧命在斯以待夫後之賢達了知單提直指之宗師承面稟必如是也時順治歲次癸巳春王日浙江杭州府餘杭縣徑山興聖萬壽禪寺住持傳臨濟正宗第三十一代孫通容費隱述五燈嚴統凡例從上佛祖相傳靡不面稟親承必有源流表信厥後五宗蔚起千枝競秀而師承的據奕葉昭彰夫是之謂統也統屬道脈收關豈容纖毫假借自非考訂精嚴將使狐蹤彌布故夫續筆傳燈良非眇事必使當時見信後世足徵貴在矢公矢慎名正辭嚴庶足以褫承虗接響之魄耳曹溪下二派首列南嶽次紀青原載在會元炳若日星近見續略所以續會元者反首青原而次南嶽豈私尊其所自之祖而顛倒其所續之書乎且西天震旦馬駒兩讖俱主南嶽而青原無聞焉即此亦可以定後先之序矣別傳一著不落文言唯是當機契證親承記莂者方譜傳燈若去聖時遙從其語句觸發者斷不容以私心遙續玄䇿云威音以後無師自悟盡屬天然外道故永嘉已徹猶參叩於曹溪覺範既悟必受印於真淨良以師承之不可已也如薦福古去雲門百有餘載而妄稱其嗣寂音呵之近世雪嶠信倣其陋轍亦嗣雲門是以私意為師承而天下後世將焉據乎斯風一啓安所底止吾為此懼不得不起而間之也故以兩家並列於未詳法嗣傳燈録紀天皇道悟嗣石頭誤以龍潭崇信嗣之致謂雲門法眼二宗出自青原一時稽核未詳千古遂成疑案今考丘玄素撰謂天王道悟嗣馬佛而龍潭為之子又考符載撰謂天皇道悟嗣石頭而慧真接其派且唐有聞人歸登著南嶽讓及權德輿馬祖塔銘各載天王道悟之名佛國白續燈録亦敘雪竇顯為馬祖九世孫佛祖通載所記亦同故大川著五燈會元而定其案曰以二參合應以天皇嗣石頭而慧真嗣之而於馬祖法嗣下入天王道悟以崇信嗣之始為不差誤矣嗟乎久而論定具眼者自當了然茲刻據改正匪敢憑臆也是編之輯祇收實契真傳而假符者不與焉近見五燈續略以普明用嗣興善廣殊不知興善未嘗得法於車溪而普明何繇得法於興善乎蓋因車溪逝世衲衣為古卓所藏而卓遂代付於興善居無何善故而衣亦不傳置諸施菴久矣嗣後普明持衣至金粟求密老人代付老人云與麼則吾宗掃地矣明復持歸乃請石雨代證嗚呼代付者果屬作家何不當機面印既非具眼又不知安所取重耶直筆削去為假竊者懲也曹洞宗派考諸世譜止於青原下十六世天童淨耳今閲五燈續略天童淨之後更載一十八世俱有機語不知從何而得及天童僧某直抵寶壽面質乃文其詞曰是皆得之少室殿前也夫殿前所紀僅有名氏歲月絶無語録等述祇是評唱之儔未明本分一著烏容濫祖燈耶然天童下至大覺姓氏猶存者以其十八世後有崛起之賢俾曹洞一宗絶而復續則此一十八世雖非宗眼相印實為世系相承故削其機語以嚴佛法之防姑存其人以紀世系所自爾近代尊宿崛起洞宗如壽昌經雲門澄固是明眼作家第壽昌之嗣廩山雲門之嗣大覺似覺未妥廩山從事異教曾自壽昌親聞暨剃髮後未聞參悟也即大覺亦傳帕之儔耳二老傑出宗匠何曾得法于本師出世拈香僅假名色從上來源全無可據若有可據當時二老必為拈出何當時無聞而今日始見耶茲刻於壽昌竟列之未詳法嗣於雲門仍列之大覺派下者其於宗眼固無機契而統裔遞沿猶存譜諜之意云爾至於兩家嫡骨兒孫唯面稟親承者方列于後壽昌法嗣僅者博山元來如元鏡元謐元賢等未承付囑諸方共聞茲刻也原以嚴核統系塞近代濫觴之門何敢私順人情開後來僭竊之竇不輕載筆者蓋慎之也是書徵搜業久彚輯有年會四方多故石匱壁函之祕未遑傾羅緘付簏笥以俟壁合珠聯茲以續略飛訛董狐絶響一回揭幅賈生之淚不禁澘然矣用是弗避讐憎嚴加斧正於以明法統之不可或淆而承虗之不可覬幸使天下後世知信史猶在今日其于慧命未必無小補云附録天皇道悟禪師文出佛祖通載第十五卷第四葉荊州城東天皇道悟禪師協律郎符載撰其略云姓張氏婺州東陽人十四出家依明州大德祝髮二十五受戒於杭州竹林寺初參國一服勤五年大曆十一年隱於大梅山建中初謁江西馬祖二年參石頭乃大悟遂隱當陽紫陵山後於荊南城東有天皇寺頃因火廢僧靈鑑將謀修復乃曰苟得悟禪師為化主必能福我時江陵尹右僕射裴公稽首問法致禮迎至師素不迎送客無貴賤皆坐而揖之裴愈加敬石頭之道殆盛于此師患背痛臨終大衆問疾師驀召典座近前師曰會麼對曰不會師拈枕子拋於地上即便告寂壽六十坐三十五夏法嗣三世曰惠真曰幽閒曰文賁實元和二年四月十三日也附録天王道悟禪師文出佛祖通載第十五卷第五葉元和十三年四月十三日天王道悟禪師入寂唐正議大夫戶部侍郎平章事荊南節度使丘玄素撰云道悟渚宮人姓崔氏子玉之後胤也年十五依長沙寺曇翥律師出家二十三謁嵩山受戒三十三參石頭頻沐指示曾未投機次謁忠國師三十四與國師侍者應真南還謁馬祖祖曰識取自心本來是佛不屬漸次不假修持體自如如萬德圓滿師於言下大悟祖囑曰汝若住持莫離舊處師蒙旨已便反荊州去郭不遠結草為廬後因節使顧問左右申其端緒節使親臨訪道見其路隘車馬難通極目荒榛曾未修削覩茲發怒令人擒師拋於水中旌斾才歸乃見遍衙火發內外紅𦦨莫可近之唯聞空中聲曰我是天王神我是天王神節使回心設拜烟𦦨都息宛然如初遂往江邊見師在水都不濕衣節使重申懺悔迎請在衙供養於府西造寺額號天王師常云快活快活及臨終時呌苦苦又云閻羅王來取我也院主問曰和尚當時被節使拋向水中神色不動如今何得恁麼地師舉枕子云汝道當時是如今是院主無對便入滅壽八十二夏六十三嗣法一人曰崇信即龍潭也更考歷代帝皇佛祖稽古略第三卷第三十四葉亦如是載故不重録附録人天眼目所載覺夢堂重較五家宗派序皇朝景德間吳僧道原集傳燈三十卷自曹溪下別為兩派一曰南嶽讓讓出馬大師一曰青原思思出石頭遷自兩派下又分五宗馬大師出八十四員善知識內有百丈海出黃檗運大溈佑二人運下出臨濟玄故號臨濟宗佑下出大仰寂故號溈仰宗八十四人又有天王悟悟得龍潭信信得德山鑒鑒得雪峰存存下出雲門宗法眼宗石頭遷出藥山儼天皇悟二人悟下得慧真真得幽間間得文賁便絶唯藥山得雲巖晟晟得洞山價價得曹山寂是為曹洞宗今傳燈卻收雲門法眼兩宗歸石頭下誤矣緣同時道悟有兩人一曰江陵城西天王寺道悟者渚宮人崔子玉之後嗣馬祖元和十三年四月十三日化正議大夫丘玄素撰塔銘文幾千言其略云馬祖祝曰他日莫離舊處故還渚宮一曰江陵城東天皇寺道悟婺州東陽人姓張氏嗣石頭元和二年丁亥化協律符載所撰二所載生緣出處甚詳但緣道原採集傳燈之日非一一親往討尋不過宛轉托人捃拾而得其差誤可知也自景德至今天下四海以傳燈為據雖列剎據位立宗者不能略加究辨唯丞相無盡居士及呂夏卿二君子每會議宗門中事嘗曰石頭得藥山山得曹洞一宗教理行果言說宛轉且天王道悟下出個周金剛呵風罵雨雖佛祖不敢嬰其鋒恐自天皇或有差誤寂音尊者亦嘗疑之云道悟似有兩人無盡後於達觀頴處得唐符載所撰天皇道悟塔記又討得丘玄素所作天王道悟塔記賫以遍示諸方曰吾嘗疑德山洞山同出石頭下因甚垂手處死活不同今以丘符二記證之朗然明白方知吾擇法驗人之不謬耳寂音曰圭峰答裴相國宗趣狀列馬祖之嗣六人首曰江陵道悟其下注曰兼稟徑山今妄以雲門臨濟二宗競者可發一笑略書梗概以傳明達者庶知五家之正派如是而已附録雪竇明覺大師語録後塔銘節略宋尚書員外郎呂夏卿撰雪竇明覺大師塔銘足二千餘言今節略內數言云禪師諱重顯字隱之大寂九世之孫智門之法嗣也據此明序雪竇係馬祖九世之孫則雲門一宗的出自南嶽派下又與從上諸家所定宗派相合尤見兩枝明著無復議矣附録宋覺範洪禪師辨宗派說出林間録上卷第十三葉荊州天王寺道悟禪師如傳燈録所載則曰道悟得法於石頭所居寺曰天皇婺州東陽人姓張氏年十四歲出家依明州大德披剃年二十五杭州竹林寺受具首謁徑山國一禪師服勤五年大歷中抵鍾陵謁馬大師經二夏乃造石頭元和丁亥四月示寂壽六十臘三十五及達觀禪師所集五家宗派則曰道悟嗣馬祖引唐丘玄素所撰文幾千言其略曰師號道悟渚宮人姓崔氏即子玉後胤也年十五於長沙寺禮曇翥律師出家二十三詣嵩山律德得尸羅謁石頭扣寂二年無所契悟乃入長安親忠國師三十四與侍者應真南還謁馬大師大悟於言下祝曰他日莫離舊處故復還渚宮元和十三年戊戌歲四月初示疾十三日歸寂壽八十二臘六十三考其傳正如兩人然玄素所載曰有傳法一人崇信住澧州龍潭南嶽讓禪師唐聞人歸登撰列法孫數人於後有道悟名圭峰答裴相國宗趣狀列馬祖之嗣六人首曰江陵道悟其下注曰兼稟徑山今妄以雲門臨濟二宗競者可發一笑附録宋靈隱大川禪師按傳燈録考辨兩家宗派說出五燈會元第七卷第二葉按景德傳燈録稱青原下出石頭遷遷下出天皇悟悟下出龍潭信信下出德山鑒鑒下出雪峰存存下出雲門偃玄沙備備再傳為法眼益皆謂雲門法眼二宗來自青原石頭雖二家兒孫亦自謂青原石頭所自出不知其差誤所從來久矣道悟同時有二人一住荊南城西天王寺嗣馬祖一住荊南城東天皇寺嗣石頭其下出龍潭信者乃馬祖下天王道悟非石頭下天皇道悟也何以明之按唐正議大夫戶部侍郎平章事荊南節度使丘玄素所撰天王道悟禪師云道悟渚宮人姓崔氏子王之後胤也年十五依長沙寺曇翥律師出家二十三詣嵩山受戒三十參石頭頻沐指示曾未投機次謁忠國師三十四與國師侍者應真南還謁馬祖祖曰識取自心本來是佛不屬漸次不假修持體自如如萬德圓滿師於言下大悟祖囑曰汝若住持莫離舊處師蒙旨已便返荊門去郭不遠結草為廬後因節使顧問左右申其端緒節使親臨訪道見其路隘車馬難通極目荒榛曾未修削覩茲發怒令人擒師拋於水中旌旗才歸乃見遍衙火發內外紅焰莫可近之唯聞空中聲曰我是天王神我是天王神節使回心設拜烟𦦨都息宛然如初遂往江邊見師在水都不濕衣節使重申懺悔迎請在衙供養於府西造寺額號天王師常云快活快活乃臨終時呌苦苦又云閻羅王來取我也院主問曰和尚當時被節度使拋向水中神色不動如今何得恁麼地師舉枕子云汝道當時是如今是院主無對便入滅當元和三年戊子十月十三日也年八十二坐六十三夏嗣法一人曰崇信即龍潭也城東天皇道悟禪師者協律郎符載撰乃與景德傳燈合其云道悟姓張氏婺州東陽人十四出家依明州大德祝髮二十五受戒於杭州竹林寺初參國一留五年大曆十一年隱於大梅山建中初謁江西馬祖二年參石頭乃大悟遂隱當陽紫陵山後於荊南城東有天皇廢寺靈鑒請居之元和二年丁亥四月十三日以背痛入滅年六十坐三十五夏法嗣三人曰慧真曰文賁曰幽間今荊南城東有天皇巷存焉唐聞人歸登撰南嶽讓禪師列法孫數人於後有天王道悟名圭峰答裴相國宗趣狀列馬祖法嗣六人首曰江陵道悟權德輿撰馬祖塔銘載弟子慧海智藏等十一人道悟其一也又呂夏卿張無盡著書皆稱道悟嗣馬祖宗門反以為誤然佛國白續燈録敘雪竇顯為大寂九世孫祖源通要録中收為馬祖之嗣達觀頴以丘玄素證之疑信相半蓋獨見丘玄素而未見符載耳今以二碑參合則應以天皇道悟嗣石頭以慧真文賁幽間嗣之而於馬祖法嗣下增入天王道悟以龍潭崇信嗣之始為不差誤矣附録宗門正名録考證禪燈世譜宗派說孝廉王谷著自曹溪下出二派一曰南嶽一曰青原南嶽出馬祖青原出石頭自二派下又分五宗馬祖出八十四人內有百丈海海出黃檗運大溈佑二人運下出臨濟玄故號臨濟宗佑出大仰寂故號溈仰宗八十四人內又有天王悟悟得龍潭信信得德山鑑鑑得雪峰存存下出雲門宗法眼宗石頭出藥山儼天皇悟二人悟下得慧真真得幽間間得文賁便絶惟藥山得雲巖晟晟得洞山價價得曹山寂是為曹洞宗今傳燈録以雲門法眼兩宗歸石頭下者緣同時道悟有兩人一曰江陵城西天王寺道悟嗣馬祖丘玄素所撰之塔銘可據也一曰江陵城東天皇寺道悟嗣石頭符載所撰之可據也木陳忞公編禪燈世譜據二以改正焉然余觀佛祖歷代通載歷代帝王佛祖稽古略之二書亦據二以定之非始于忞公也司理黃公出考定宗派一示于雪竇山中天童判之詳見直說中茲不復贅第黃公示中云密雲寄我雪峰廣録一冊舟中無事展玩終篇及讀至雪峰玄沙答閩王一段因緣內稱山僧自從先德山石頭以來傳此祕密法門然後信傳燈之有據也天皇果為馬祀之子則雪峰何不徑稱先德山馬祖以來反稱先德山石頭以來耶天童於此處未以深辨愚謂雪峰嗣德山而及於石頭者蓋雪峰三登投子九上洞山于洞山之法亦曾染指而洞山之祖為石頭因而及之見得傳此法門不止于本宗本師耳一時泛論之見原非敘述法派何得即認為石頭之裔耶且取信當從其衆者又何可以石頭二字而掃抹諸家之文獻耶但此等援引剖分尚在法派上辨明專以事述為證據不知法派之分全繇於宗旨蓋五家門庭施設不同各有師承印其悟入據悟入處為人提掇是為宗旨所在雖流傳之久不相混濫也凡若此者姑不他引即以雪峰論之峰在洞山作飯頭偶淘米次山問云淘沙去米淘米去沙峰云沙米一齊去山云大衆喫個什麼峰遂覆却盆山云觀子因緣不在此當往德山後雪峰果法嗣德山繇此觀之豈非洞山與德山宗旨不同故洞山指之參德山乎即宗旨之不同便見法系之攸異又何疑焉余觀諸家議論猶在事迹證據中惟張無盡之言最為深切與余所引雪峰因緣有互相發明者無盡與呂夏卿論宗門中事曰石頭得藥山山得曹洞一宗教理行果言說宛轉且天皇道悟下出個周金剛呵風罵雨雖佛祖不敢嬰其鋒恐自天皇或有差誤後得丘玄素符載二記賫以遍示諸方曰吾嘗疑德山洞山同出石頭下因甚垂手處死活不同今以丘符二記證之朗然明白方知吾擇法驗人之不謬耳此則直從施設處勘出不同明宗旨以正法派一言而定千古之疑譬如世人子嗣有訛考核宗譜固可辨明若一滴血則真僞立剖無盡之言可謂滴血而得其真者矣附録寂音尊者彈斥薦福古遙嗣雲門偃林間録云古塔主去雲門之世無慮百年而稱其嗣青華嚴未始識太陽特以浮山遠公之語故嗣之不疑二老皆以傳言行之自若其於己甚重於法甚輕古之人於法重者永嘉黃檗是也永嘉因閲維摩悟佛心宗而往見六祖曰吾欲定宗旨也黃檗悟馬祖之意而嗣百丈故百丈嘆以為不及也僧寶傳曰古說法有三失其一判三玄三要為玄沙所立三句其二罪巴陵之語不識活句其三分兩種自己不知聖人立言之難文字禪題古塔主論玄要云吾無以徵其失將撼臨濟起而使痛叱之乃快也又題論兩種自己云古蓋吾法中罪人而自以能嗣雲門其自欺欺人之狀不窮而自露此三言者又足見目謂得悟立言杜撰師承之不可已而妄攀宗祖之不可為也即古塔主廁名於傳燈自是修燈者無寂音之卓識故不能奮董狐之筆以濫入之為後人僭竊之口實然雖廁名傳燈而終不免于種種之彈斥法門紀綱如此其肅後人當以為鑑又豈可從而效之哉此段正名録檢出僧寶傳更多彈斥不具録較正五燈嚴統姓氏張端字中柱學士山東人劉肇國字阮仙學士湖廣人劉子壯字克猷修撰湖廣人范正脈字介子編修河南人宋𣏌字小暹檢討北直籍湖廣人石申字仲生北直籍湖廣人范周字端人翰林江南吳縣人韋克振字聲玉刺史湖廣黃岡人韋成賢字念莪左春坊湖廣黃岡人曹勳字莪雪戊辰會元歷任禮部侍郎浙江嘉善籍江南華亭人莊元禎號茲虞戊辰進士官至陝西關西道右參政江南華亭人楊廷鑑號氷如癸未狀元江南常州人宋之繩號其武癸未榜眼江南栗陽人吳偉業字駿公辛未會元榜眼歷任官詹江南太倉人陸慶衍子椒頌癸未進士江南華亭人曹溶字秋嶽太僕卿浙江平湖人單恂號專氷庚辰進士江南華亭人洗荃字貞蕤壬辰探花編修江南華亭人李愫字素心壬辰傳臚禮部精膳司主事江南華亭人張安豫號森嶽杭嘉湖分守道江南華亭人張安苞號再菴知縣江南華亭人周茂源號釜臣己丑進士刑部清吏司郎中江南華亭人王廣心字伊人己丑進士行人司行人江南華亭人張安茂號蓼匪丁亥進士工部主事江南華亭人朱紹鳳號儀聖己丑進士知縣江南華亭人吳琨號約叟江南太倉人吳克孝號魯岡嘉湖道江南太倉人孫逢吉號念莪封翁江南太倉人胡周鼎號卣臣庚辰進士刑科左給事中江南太倉人孫以敬號令修丁丑進士江南太倉人王時敏號烟客太僕卿江南太倉人王挺號周臣江南太倉人錢埴號令濤孝廉江南太倉人周昌晉字衷玄代巡浙江鄞縣人陳朝輔字平若代巡浙江鄞縣人姚應翀字磊齊代巡浙江鄞縣人史鼎字爾鉉縣令江南栗陽人吳晉錫號梓授開府江南吳江人龐霦號象六知縣江南吳江人葉紹顒號季若按臺江南吳江人金之礦號念菴刺史江南吳江人周燦號光甫按臺江南吳江人吳有涯號茂申按臺江南吳江人沈聖揆號戒凡學政江南吳江人沈自南號留侯進士江南吳江人周永言號安仁中書江南吳江人周永肩號安石國學江南吳江人蔡嘉明字君初光祿寺江南華亭人朱萬禧字匏菴明經江南華亭人李恪字臣共明經江南華亭人張文嘉字仲嘉文學浙江錢塘人彭賓字燕又孝廉江南華亭人蔡聯璧字子穀文學浙江海寧人陳章字惠文文學江南華亭人董仁緒字爾潛文學浙江海昌人陳麟起字機來文學江南青浦人重訂五燈嚴統銜氏徐昌治字覲周孝廉浙江海鹽人李中梓字士材明經江南華亭人詳定五燈嚴統名氏釋通容字費隱現住徑山輯續五燈嚴統名氏釋行元字百癡現住金粟考閲五燈嚴統名氏
